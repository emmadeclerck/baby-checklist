<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Checklist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700&display=swap');

:root {
  --rose: #E8B4B8;
  --rose-light: #F5D5D8;
  --rose-ultra: #FBE9EB;
  --sage: #B5C5A3;
  --sage-light: #D4E0C8;
  --sage-ultra: #EBF0E4;
  --cream: #FDF8F4;
  --sand: #F5EDE6;
  --sand-dark: #E8DDD4;
  --taupe: #9B8E82;
  --taupe-dark: #6B6058;
  --text: #3D3530;
  --text-light: #7A6E65;
  --white: #FFFFFF;
  --lavender: #C5B9CD;
  --lavender-light: #E8E0ED;
  --peach: #F0C9A6;
  --peach-light: #F8E2CD;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--rose-light) 0%, var(--lavender-light) 50%, var(--sage-light) 100%);
  padding: 2.5rem 1.5rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.3) 0%, transparent 60%);
  pointer-events: none;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--taupe-dark);
  position: relative;
  letter-spacing: -0.02em;
}
.header p {
  font-size: 0.9rem;
  color: var(--taupe);
  margin-top: 0.3rem;
  position: relative;
  font-style: italic;
}

/* Progress bar */
.progress-wrap {
  padding: 0.8rem 1.5rem;
  background: var(--white);
  border-bottom: 1px solid var(--sand);
  position: sticky;
  top: 0;
  z-index: 90;
}
.progress-bar-bg {
  height: 6px;
  background: var(--sand);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rose), var(--sage));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 0.75rem;
  color: var(--taupe);
  margin-top: 0.3rem;
  text-align: right;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--sand);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 52px;
  z-index: 89;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: fit-content;
  padding: 0.85rem 1rem;
  text-align: center;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--taupe);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: all 0.25s ease;
  white-space: nowrap;
  user-select: none;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.tab:hover { color: var(--taupe-dark); background: var(--sand); }
.tab.active {
  color: var(--taupe-dark);
  border-bottom-color: var(--rose);
  background: var(--rose-ultra);
}
.tab .tab-count {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  background: var(--sand);
  color: var(--taupe);
  padding: 0.1rem 0.45rem;
  border-radius: 10px;
  margin-left: 0.35rem;
  vertical-align: middle;
}
.tab.active .tab-count {
  background: var(--rose-light);
  color: var(--taupe-dark);
}

/* Page content */
.page { display: none; padding: 1rem 1rem 6rem; max-width: 720px; margin: 0 auto; }
.page.active { display: block; }

/* Category sections */
.category { margin-bottom: 1.5rem; }
.category-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 0;
  margin-bottom: 0.5rem;
  cursor: pointer;
  user-select: none;
}
.category-icon {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.category-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--taupe-dark);
  flex: 1;
}
.category-count {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--taupe);
  background: var(--sand);
  padding: 0.15rem 0.55rem;
  border-radius: 10px;
}
.category-chevron {
  color: var(--taupe);
  transition: transform 0.25s ease;
  font-size: 0.8rem;
}
.category.collapsed .category-chevron { transform: rotate(-90deg); }
.category.collapsed .category-items { display: none; }

/* Items */
.item {
  background: var(--white);
  border-radius: 12px;
  padding: 0.85rem 1rem;
  margin-bottom: 0.5rem;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
  border: 1px solid var(--sand);
  transition: all 0.2s ease;
  position: relative;
}
.item:hover { border-color: var(--sand-dark); }
.item.checked { opacity: 0.55; background: var(--sand); }
.item.checked .item-name { text-decoration: line-through; }
.item.custom-item { border-left: 3px solid var(--lavender); }
.item.hidden-original { display: none; }

.checkbox {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--sand-dark);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
  margin-top: 1px;
  background: var(--white);
}
.checkbox:hover { border-color: var(--rose); }
.checkbox.checked { background: var(--sage); border-color: var(--sage); }
.checkbox.checked::after {
  content: '';
  width: 6px; height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}

.item-content { flex: 1; min-width: 0; }
.item-name {
  font-weight: 500;
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.4;
}
.item-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.35rem;
}
.meta-tag {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 6px;
  font-weight: 500;
}
.meta-merk { background: var(--lavender-light); color: #6B5A7A; cursor: pointer; position: relative; }
.meta-merk:hover { background: #D5C8DE; }
.meta-merk::after { content: ' \270E'; font-size: 0.65rem; opacity: 0.5; }
.merk-edit-wrap {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  margin-top: 0.35rem;
}
.merk-edit-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  padding: 0.15rem 0.45rem;
  border: 1.5px solid var(--lavender);
  border-radius: 6px;
  background: var(--white);
  color: #6B5A7A;
  outline: none;
  width: 120px;
}
.merk-edit-input:focus { border-color: var(--rose); }
.merk-edit-ok, .merk-edit-cancel {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6rem;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  padding: 0.15rem 0.35rem;
  line-height: 1;
}
.merk-edit-ok { background: var(--sage-light); color: #5A6B4A; }
.merk-edit-ok:hover { background: var(--sage); }
.merk-edit-cancel { background: var(--sand); color: var(--taupe); }
.merk-edit-cancel:hover { background: var(--sand-dark); }
.meta-wanneer { background: var(--peach-light); color: #8B6B4A; }
.meta-hoeveel { background: var(--sage-ultra); color: #5A6B4A; }
.meta-waar { background: var(--rose-ultra); color: #8B5A5E; }
.meta-custom { background: var(--lavender-light); color: #6B5A7A; font-style: italic; }

/* Item actions (hide/delete) */
.item-actions {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  margin-top: 1px;
}
.btn-hide, .btn-delete {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  background: transparent;
  color: var(--taupe);
  opacity: 0;
}
.item:hover .btn-hide,
.item:hover .btn-delete { opacity: 0.6; }
.btn-hide:hover { background: var(--sand); opacity: 1 !important; color: var(--taupe-dark); }
.btn-delete:hover { background: var(--rose-ultra); opacity: 1 !important; color: #B85A5E; }
/* On touch devices, always show buttons */
@media (hover: none) {
  .btn-hide, .btn-delete { opacity: 0.5; }
}

/* Tip toggle */
.tip-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.7rem;
  color: var(--taupe);
  cursor: pointer;
  margin-top: 0.4rem;
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  background: var(--sand);
  transition: background 0.2s;
  border: none;
  font-family: inherit;
}
.tip-toggle:hover { background: var(--sand-dark); }
.tip-text {
  display: none;
  margin-top: 0.4rem;
  font-size: 0.8rem;
  color: var(--text-light);
  line-height: 1.5;
  padding: 0.6rem 0.75rem;
  background: var(--cream);
  border-radius: 8px;
  border-left: 3px solid var(--rose-light);
  font-style: italic;
}
.tip-text.open { display: block; }

/* To do timeline */
.timeline-group { margin-bottom: 2rem; }
.timeline-label {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--taupe-dark);
  padding: 0.5rem 0;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.timeline-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--rose);
  flex-shrink: 0;
}

/* Hospital info box */
.info-box {
  background: linear-gradient(135deg, var(--rose-ultra), var(--lavender-light));
  border-radius: 12px;
  padding: 1rem 1.2rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--rose-light);
}
.info-box h3 {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--taupe-dark);
  margin-bottom: 0.3rem;
}
.info-box p {
  font-size: 0.8rem;
  color: var(--taupe);
  line-height: 1.5;
}

/* Niet meenemen */
.niet-meenemen {
  background: var(--sage-ultra);
  border: 1px solid var(--sage-light);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  margin-top: 1.5rem;
}
.niet-meenemen h3 {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  color: var(--taupe-dark);
  margin-bottom: 0.5rem;
}
.niet-meenemen ul { list-style: none; padding: 0; }
.niet-meenemen li {
  font-size: 0.85rem;
  color: var(--text-light);
  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.niet-meenemen li::before {
  content: '\2713';
  position: absolute;
  left: 0;
  color: var(--sage);
  font-weight: 700;
}

/* Kledij merken */
.merken-box {
  background: var(--white);
  border: 1px solid var(--sand);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  margin-bottom: 1.5rem;
}
.merken-box h3 { font-size: 0.8rem; font-weight: 600; color: var(--taupe-dark); margin-bottom: 0.2rem; }
.merken-box p { font-size: 0.8rem; color: var(--text-light); line-height: 1.5; }
.merken-box + .merken-box { margin-top: -0.5rem; }

/* Reset & bottom buttons */
.reset-wrap {
  text-align: center;
  padding: 2rem 0;
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}
.reset-btn, .undo-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--taupe);
  background: var(--sand);
  border: 1px solid var(--sand-dark);
  padding: 0.5rem 1.2rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover, .undo-btn:hover { background: var(--sand-dark); }

/* Filter pills */
.filter-bar {
  display: flex;
  gap: 0.4rem;
  padding: 0.75rem 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  flex-wrap: wrap;
}
.filter-pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  border: 1px solid var(--sand-dark);
  background: var(--white);
  color: var(--taupe);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.filter-pill:hover { background: var(--sand); }
.filter-pill.active { background: var(--rose-light); border-color: var(--rose); color: var(--taupe-dark); }

/* Search */
.search-wrap { padding: 0.75rem 0 0.25rem; }
.search-input {
  width: 100%;
  padding: 0.6rem 1rem;
  border: 1px solid var(--sand-dark);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  background: var(--white);
  color: var(--text);
  outline: none;
  transition: border 0.2s;
}
.search-input:focus { border-color: var(--rose); }
.search-input::placeholder { color: var(--taupe); }

/* Add item button */
.add-item-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 0.7rem;
  margin-top: 0.5rem;
  margin-bottom: 1rem;
  border: 2px dashed var(--sand-dark);
  border-radius: 12px;
  background: transparent;
  color: var(--taupe);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.add-item-btn:hover {
  border-color: var(--rose);
  background: var(--rose-ultra);
  color: var(--taupe-dark);
}

/* Add form */
.add-form {
  background: var(--white);
  border: 1px solid var(--rose-light);
  border-radius: 12px;
  padding: 1rem;
  margin-top: 0.5rem;
  margin-bottom: 1rem;
  display: none;
}
.add-form.open { display: block; }
.add-form-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  color: var(--taupe-dark);
  margin-bottom: 0.75rem;
}
.add-form-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}
.add-form-row input, .add-form-row select {
  flex: 1;
  min-width: 120px;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--sand-dark);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  background: var(--cream);
  color: var(--text);
  outline: none;
}
.add-form-row input:focus, .add-form-row select:focus { border-color: var(--rose); }
.add-form-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.add-form-submit {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: var(--rose-light);
  color: var(--taupe-dark);
  transition: background 0.2s;
}
.add-form-submit:hover { background: var(--rose); }
.add-form-cancel {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  padding: 0.5rem 1rem;
  border: 1px solid var(--sand-dark);
  border-radius: 8px;
  cursor: pointer;
  background: var(--white);
  color: var(--taupe);
  transition: background 0.2s;
}
.add-form-cancel:hover { background: var(--sand); }

/* Hidden items toggle */
.hidden-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--taupe);
  padding: 0.5rem;
  cursor: pointer;
  background: none;
  border: none;
  margin: 0.5rem auto;
  transition: color 0.2s;
}
.hidden-toggle:hover { color: var(--taupe-dark); }

/* Responsive */
@media (min-width: 768px) {
  .header { padding: 3rem 2rem 1.5rem; }
  .header h1 { font-size: 2.5rem; }
  .page { padding: 1.5rem 2rem 6rem; }
  .tab { font-size: 0.85rem; padding: 0.9rem 1.2rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Baby Checklist</h1>
  <p>Van zwangerschapswens tot na de geboorte</p>
  <p style="font-size:0.75rem;margin-top:0.5rem;opacity:0.7;position:relative">&copy; Emma Declerck</p>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0 afgevinkt</div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-page="geboortelijst">Geboortelijst <span class="tab-count" id="count-geboortelijst"></span></button>
  <button class="tab" data-page="kledij">Kledij <span class="tab-count" id="count-kledij"></span></button>
  <button class="tab" data-page="todos">To do's <span class="tab-count" id="count-todos"></span></button>
  <button class="tab" data-page="ziekenhuis">Ziekenhuiszak <span class="tab-count" id="count-ziekenhuis"></span></button>
</div>

<div class="page active" id="page-geboortelijst">
  <div class="search-wrap">
    <input type="text" class="search-input" placeholder="Zoek een product..." data-page="geboortelijst">
  </div>
  <div class="filter-bar" id="filters-geboortelijst"></div>
  <div id="content-geboortelijst"></div>
</div>

<div class="page" id="page-kledij">
  <div id="content-kledij"></div>
</div>

<div class="page" id="page-todos">
  <div class="search-wrap">
    <input type="text" class="search-input" placeholder="Zoek een taak..." data-page="todos">
  </div>
  <div id="content-todos"></div>
</div>

<div class="page" id="page-ziekenhuis">
  <div id="content-ziekenhuis"></div>
</div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">Alle vinkjes resetten</button>
  <button class="undo-btn" onclick="showHiddenItems()">Verborgen items tonen</button>
  <button class="reset-btn" onclick="resetEverything()">Alles resetten</button>
</div>

<script>
// === DATA ===
const DATA = {
  geboortelijst: [
    {c:"Eten",p:"Afkolf-zakjes (50)",m:"Medela / Lansinoh",w:"Vanaf 6 weken"},
    {c:"Eten",p:"Tripp Trapp",m:"Stokke",w:"Vanaf 6 weken"},
    {c:"Eten",p:"Verkleinset tripp trapp",m:"Stokke",w:"Vanaf geboorte"},
    {c:"Eten",p:"Babyset tripp trapp",m:"Stokke",w:"Vanaf 4-6 maanden"},
    {c:"Eten",p:"Melkpoederdoosje",m:"We-Too",w:"Vanaf 6 weken",t:"Handiger dan melkpoedertoren, want je ziet goed wat er nog in zit + compacter van formaat"},
    {c:"Eten",p:"Voedingskussen klein formaat (2)",m:"Doomoo",w:"Vanaf geboorte",t:"Kleine voedingskussens zijn handiger voor tijdens de borstvoeding, grote dienen eerder als zwangerschapskussens voor tijdens het slapen"},
    {c:"Eten",p:"Combi stomer/mixer/sterilisator",m:"Nutribaby+ XL",w:"Vanaf 4-6 maanden"},
    {c:"Eten",p:"Uitdruiprek flesjes",m:"?",w:"Vanaf geboorte"},
    {c:"Eten",p:"Tetradoeken alle formaten: washandjes, monddoekjes, 70x70, XL",m:"Zeeman/Hema/Jollein",w:"Vanaf geboorte",t:"Je kan nooit genoeg tetradoeken hebben :) wij hebben er zeker 10"},
    {c:"Eten",p:"Papflesjes klein",m:"Philips Avent",w:"Vanaf 6 weken",t:"Je hebt verschillende groottes van speentjes op de papfles en je zal de eerste keer verschillende maatjes moeten testen om te kijken wat het best werkt voor jouw baby: best dus een maatje 1-2-3 in huis halen om te testen."},
    {c:"Eten",p:"Papflesjes groot",m:"Philips Avent",w:"Vanaf 4 maanden"},

// === STORAGE ===
const K_CHECKED = 'baby-checklist-v1';
const K_HIDDEN  = 'baby-checklist-hidden';
const K_CUSTOM  = 'baby-checklist-custom';
const K_MERKEN  = 'baby-checklist-merken';

let checked = {};
let hidden  = {};
let custom  = { gb: [], kl: [], td: [], zh: [] };
let merken  = {};

function loadStorage() {
  try { checked = JSON.parse(localStorage.getItem(K_CHECKED)) || {}; } catch(e) { checked = {}; }
  try { hidden  = JSON.parse(localStorage.getItem(K_HIDDEN))  || {}; } catch(e) { hidden  = {}; }
  try { custom  = JSON.parse(localStorage.getItem(K_CUSTOM))  || { gb:[], kl:[], td:[], zh:[] }; } catch(e) { custom = { gb:[], kl:[], td:[], zh:[] }; }
  try { merken  = JSON.parse(localStorage.getItem(K_MERKEN))  || {}; } catch(e) { merken = {}; }
  if (!custom.gb) custom.gb = [];
  if (!custom.kl) custom.kl = [];
  if (!custom.td) custom.td = [];
  if (!custom.zh) custom.zh = [];
}
function saveChecked() { localStorage.setItem(K_CHECKED, JSON.stringify(checked)); }
function saveHidden()  { localStorage.setItem(K_HIDDEN, JSON.stringify(hidden)); }
function saveCustom()  { localStorage.setItem(K_CUSTOM, JSON.stringify(custom)); }
function saveMerken()  { localStorage.setItem(K_MERKEN, JSON.stringify(merken)); }

loadStorage();

// === SORTING ===
function wanneerOrder(w) {
  if (!w) return 99;
  const s = w.toLowerCase().trim();
  if (s.includes('vanaf geboorte')) return 10;
  if (s.includes('vanaf 6 weken') || s === '6 weken') return 20;
  if (s.includes('vanaf 4 maanden')) return 30;
  if (s.includes('vanaf 4-6 maanden')) return 35;
  if (s.includes('vanaf 6 maanden')) return 40;
  if (s.includes('zwangerschapswens')) return 0;
  if (s.includes('positieve zwangerschapstest')) return 1;
  if (s.includes('zwangerschap bevestigd')) return 2;
  const weekMatch = s.match(/(\d+)\s*weken/);
  if (weekMatch) return 3 + parseInt(weekMatch[1]) * 0.1;
  if (s.includes('bij geboorte') || s.includes('na geboorte')) return 50;
  if (s.includes('thuiskomst')) return 55;
  return 90;
}

function sortByWanneer(items, wanneerKey) {
  return [...items].sort((a, b) => wanneerOrder(a[wanneerKey]) - wanneerOrder(b[wanneerKey]));
}

// === HELPERS ===
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderTip(tip) {
  if (!tip) return '';
  return '<button class="tip-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\'); this.querySelector(\'span\').textContent = this.nextElementSibling.classList.contains(\'open\') ? \'\u25B2 Tip\' : \'\u25BC Tip\'"><span>\u25BC Tip</span></button><div class="tip-text">' + esc(tip) + '</div>';
}

function renderItem(id, name, meta, tip, isCustom) {
  if (hidden[id]) return '';
  const isChecked = checked[id] || false;
  const customClass = isCustom ? ' custom-item' : '';
  const actionBtn = isCustom
    ? '<button class="btn-delete" onclick="deleteCustomItem(\'' + id + '\')" title="Verwijderen">\u2715</button>'
    : '<button class="btn-hide" onclick="hideItem(\'' + id + '\')" title="Verbergen">\u2715</button>';
  return '<div class="item' + (isChecked ? ' checked' : '') + customClass + '" data-id="' + id + '">' +
    '<div class="checkbox' + (isChecked ? ' checked' : '') + '" onclick="toggleCheck(\'' + id + '\', this)"></div>' +
    '<div class="item-content">' +
      '<div class="item-name">' + esc(name) + '</div>' +
      (meta ? '<div class="item-meta">' + meta + '</div>' : '') +
      renderTip(tip) +
    '</div>' +
    '<div class="item-actions">' + actionBtn + '</div>' +
  '</div>';
}

function toggleCheck(id, el) {
  checked[id] = !checked[id];
  saveChecked();
  const item = el.closest('.item');
  item.classList.toggle('checked');
  el.classList.toggle('checked');
  updateProgress();
}

function hideItem(id) {
  hidden[id] = true;
  saveHidden();
  const el = document.querySelector('[data-id="' + id + '"]');
  if (el) el.style.display = 'none';
  updateProgress();
}

function deleteCustomItem(id) {
  const parts = id.split('-custom-');
  const prefix = parts[0];
  const idx = parseInt(parts[1]);
  custom[prefix].splice(idx, 1);
  delete checked[id];
  saveCustom();
  saveChecked();
  rerender();
}

function editMerk(id, currentMerk, el) {
  const parent = el.parentElement;
  el.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'merk-edit-wrap';
  const input = document.createElement('input');
  input.className = 'merk-edit-input';
  input.type = 'text';
  input.value = currentMerk;
  input.placeholder = 'Merk';
  const okBtn = document.createElement('button');
  okBtn.className = 'merk-edit-ok';
  okBtn.textContent = '\u2713';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'merk-edit-cancel';
  cancelBtn.textContent = '\u2715';
  wrap.appendChild(input);
  wrap.appendChild(okBtn);
  wrap.appendChild(cancelBtn);
  parent.insertBefore(wrap, el.nextSibling);
  input.focus();
  input.select();

  function save() {
    const val = input.value.trim();
    if (val && val !== currentMerk) {
      merken[id] = val;
      saveMerken();
    } else if (!val) {
      delete merken[id];
      saveMerken();
    }
    wrap.remove();
    rerender();
  }
  function cancel() {
    wrap.remove();
    el.style.display = '';
  }
  okBtn.addEventListener('click', save);
  cancelBtn.addEventListener('click', cancel);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') cancel();
  });
}

function getMerk(id, originalMerk) {
  return merken[id] !== undefined ? merken[id] : originalMerk;
}

function showHiddenItems() {
  const count = Object.keys(hidden).length;
  if (count === 0) { alert('Er zijn geen verborgen items.'); return; }
  if (confirm(count + ' verborgen item(s) weer tonen?')) {
    hidden = {};
    saveHidden();
    rerender();
  }
}

function getAllVisibleIds() {
  const ids = [];
  DATA.geboortelijst.forEach((_, i) => { const id = 'gb-' + i; if (!hidden[id]) ids.push(id); });
  DATA.kledij.items.forEach((_, i) => { const id = 'kl-' + i; if (!hidden[id]) ids.push(id); });
  DATA.todos.forEach((_, i) => { const id = 'td-' + i; if (!hidden[id]) ids.push(id); });
  DATA.ziekenhuis.items.forEach((_, i) => { const id = 'zh-' + i; if (!hidden[id]) ids.push(id); });
  custom.gb.forEach((_, i) => { const id = 'gb-custom-' + i; if (!hidden[id]) ids.push(id); });
  custom.kl.forEach((_, i) => { const id = 'kl-custom-' + i; if (!hidden[id]) ids.push(id); });
  custom.td.forEach((_, i) => { const id = 'td-custom-' + i; if (!hidden[id]) ids.push(id); });
  custom.zh.forEach((_, i) => { const id = 'zh-custom-' + i; if (!hidden[id]) ids.push(id); });
  return ids;
}

function updateProgress() {
  const allIds = getAllVisibleIds();
  const total = allIds.length;
  const done = allIds.filter(id => checked[id]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' afgevinkt (' + pct + '%)';
  updateTabCounts();
}

function updateTabCounts() {
  function countPage(prefix, baseLen, customArr) {
    let total = 0, done = 0;
    for (let i = 0; i < baseLen; i++) { const id = prefix + '-' + i; if (!hidden[id]) { total++; if (checked[id]) done++; } }
    for (let i = 0; i < customArr.length; i++) { const id = prefix + '-custom-' + i; if (!hidden[id]) { total++; if (checked[id]) done++; } }
    return { done, total };
  }
  const pages = {
    geboortelijst: countPage('gb', DATA.geboortelijst.length, custom.gb),
    kledij: countPage('kl', DATA.kledij.items.length, custom.kl),
    todos: countPage('td', DATA.todos.length, custom.td),
    ziekenhuis: countPage('zh', DATA.ziekenhuis.items.length, custom.zh)
  };
  for (const [page, info] of Object.entries(pages)) {
    document.getElementById('count-' + page).textContent = info.done + '/' + info.total;
  }
}

function toggleAddForm(page) {
  document.querySelectorAll('.add-form[data-page="' + page + '"]').forEach(form => {
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      form.querySelector('input').focus();
    }
  });
}

function addCustomItem(page, btn) {
  const form = btn.closest('.add-form');
  const inputs = form.querySelectorAll('input, select');
  const name = inputs[0].value.trim();
  if (!name) { inputs[0].focus(); return; }

  let item = {};
  if (page === 'gb') {
    item = { c: inputs[1].value || 'Eigen', p: name, m: inputs[2].value.trim(), w: inputs[3].value.trim() };
  } else if (page === 'kl') {
    item = { p: name, m: inputs[1].value.trim(), h: inputs[2].value.trim(), w: inputs[3].value.trim() };
  } else if (page === 'td') {
    item = { d: name, wr: inputs[1].value.trim(), w: inputs[2].value.trim(), g: inputs[3].value || 'Eigen' };
  } else if (page === 'zh') {
    item = { c: inputs[1].value || 'Eigen', w: name };
  }

  custom[page].push(item);
  saveCustom();
  inputs.forEach(i => { if (i.tagName === 'INPUT') i.value = ''; });
  form.classList.remove('open');
  rerender();
}

// === RENDER ===
function renderGeboortelijst() {
  const container = document.getElementById('content-geboortelijst');
  const allItems = [...DATA.geboortelijst, ...custom.gb.map(i => ({...i, _custom: true}))];
  const cats = [...new Set(allItems.map(i => i.c))];

  const filterBar = document.getElementById('filters-geboortelijst');
  filterBar.innerHTML = '<button class="filter-pill active" onclick="setFilter(\'Alles\', this)">Alles</button>' +
    cats.map(c => '<button class="filter-pill" onclick="setFilter(\'' + esc(c) + '\', this)">' + esc(c) + '</button>').join('');

  let html = gbFormHtml();

  cats.forEach(cat => {
    const items = sortByWanneer(allItems.filter(i => i.c === cat), 'w');
    const s = CAT_STYLE[cat] || { icon: '\u2728', bg: '#F5EDE6' };
    const visibleCount = items.filter(item => {
      const isCustom = item._custom;
      const idx = isCustom ? custom.gb.indexOf(item) || custom.gb.findIndex(ci => ci.p === item.p && ci.c === item.c) : DATA.geboortelijst.indexOf(item);
      const id = isCustom ? 'gb-custom-' + idx : 'gb-' + idx;
      return !hidden[id];
    }).length;

    html += '<div class="category" data-cat="' + esc(cat) + '">' +
      '<div class="category-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<div class="category-icon" style="background:' + s.bg + '">' + s.icon + '</div>' +
        '<h2>' + esc(cat) + '</h2>' +
        '<span class="category-count">' + visibleCount + '</span>' +
        '<span class="category-chevron">\u25BC</span>' +
      '</div><div class="category-items">';

    items.forEach(item => {
      const isCustom = !!item._custom;
      let idx, id;
      if (isCustom) {
        idx = custom.gb.findIndex(ci => ci === item || (ci.p === item.p && ci.c === item.c));
        id = 'gb-custom-' + idx;
      } else {
        idx = DATA.geboortelijst.indexOf(item);
        id = 'gb-' + idx;
      }
      const displayMerk = getMerk(id, item.m);
      let meta = '';
      if (displayMerk) meta += '<span class="meta-tag meta-merk" onclick="editMerk(\'' + id + '\', \'' + esc(displayMerk).replace(/'/g, "\\'") + '\', this)">' + esc(displayMerk) + '</span>';
      if (item.w) meta += '<span class="meta-tag meta-wanneer">' + esc(item.w) + '</span>';
      if (isCustom) meta += '<span class="meta-tag meta-custom">eigen toevoeging</span>';
      if (!displayMerk && item.p) meta += '<span class="meta-tag meta-merk" style="opacity:0.4;border:1px dashed var(--lavender)" onclick="editMerk(\'' + id + '\', \'\', this)">+ merk</span>';
      html += renderItem(id, item.p, meta, item.t, isCustom);
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function setFilter(cat, el) {
  document.querySelectorAll('#filters-geboortelijst .filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#content-geboortelijst .category').forEach(c => {

    let meta = '';
    if (displayMerk) meta += '<span class="meta-tag meta-merk" onclick="editMerk(\'' + item._id + '\', \'' + esc(displayMerk).replace(/'/g, "\\'") + '\', this)">' + esc(displayMerk) + '</span>';
    if (item.h) meta += '<span class="meta-tag meta-hoeveel">' + esc(item.h) + '</span>';
    if (item.w) meta += '<span class="meta-tag meta-wanneer">' + esc(item.w) + '</span>';
    if (item._custom) meta += '<span class="meta-tag meta-custom">eigen toevoeging</span>';
    if (!displayMerk) meta += '<span class="meta-tag meta-merk" style="opacity:0.4;border:1px dashed var(--lavender)" onclick="editMerk(\'' + item._id + '\', \'\', this)">+ merk</span>';
    html += renderItem(item._id, item.p, meta, item.t, item._custom);
  });

  container.innerHTML = html;
}

function renderTodos() {
  const container = document.getElementById('content-todos');
  const allTodos = [...DATA.todos, ...custom.td.map(i => ({...i, _custom: true}))];
  const groups = [...new Set(allTodos.map(t => t.g))];

  let html = tdFormHtml();

  groups.forEach(group => {
    const items = allTodos.filter(t => t.g === group);
    html += '<div class="timeline-group"><div class="timeline-label"><span class="timeline-dot"></span>' + esc(group) + '</div>';
    items.forEach(item => {
      const isCustom = !!item._custom;
      let idx, id;
      if (isCustom) {
        idx = custom.td.findIndex(ci => ci === item || (ci.d === item.d && ci.g === item.g));
        id = 'td-custom-' + idx;
      } else {
        idx = DATA.todos.indexOf(item);
        id = 'td-' + idx;
      }
      let meta = '';
      if (item.wr) meta += '<span class="meta-tag meta-waar">' + esc(item.wr) + '</span>';
      if (item.w) meta += '<span class="meta-tag meta-wanneer">' + esc(item.w) + '</span>';
      if (isCustom) meta += '<span class="meta-tag meta-custom">eigen toevoeging</span>';
      html += renderItem(id, item.d, meta, item.t, isCustom);
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function renderZiekenhuis() {
  const container = document.getElementById('content-ziekenhuis');
  let html = '<div class="info-box"><h3>2 zakken klaarzetten</h3><p>1 voor het verloskwartier, 1 voor de kamer. Zet je zak klaar rond 36 weken.</p></div>';

  html += zhFormHtml();

  const allItems = [...DATA.ziekenhuis.items, ...custom.zh.map(i => ({...i, _custom: true}))];
  const cats = [...new Set(allItems.map(i => i.c))];

  cats.forEach(cat => {
    const items = allItems.filter(i => i.c === cat);
    const s = CAT_STYLE[cat] || { icon: '\u2728', bg: '#F5EDE6' };
    const visibleCount = items.filter(item => {
      const isCustom = !!item._custom;
      const idx = isCustom ? custom.zh.findIndex(ci => ci === item || (ci.w === item.w && ci.c === item.c)) : DATA.ziekenhuis.items.indexOf(item);
      const id = isCustom ? 'zh-custom-' + idx : 'zh-' + idx;
      return !hidden[id];
    }).length;

    html += '<div class="category">' +
      '<div class="category-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<div class="category-icon" style="background:' + s.bg + '">' + s.icon + '</div>' +
        '<h2>' + esc(cat) + '</h2>' +
        '<span class="category-count">' + visibleCount + '</span>' +
        '<span class="category-chevron">\u25BC</span>' +
      '</div><div class="category-items">';

    items.forEach(item => {
      const isCustom = !!item._custom;
      let idx, id;
      if (isCustom) {
        idx = custom.zh.findIndex(ci => ci === item || (ci.w === item.w && ci.c === item.c));
        id = 'zh-custom-' + idx;
      } else {
        idx = DATA.ziekenhuis.items.indexOf(item);
        id = 'zh-' + idx;
      }
      let meta = isCustom ? '<span class="meta-tag meta-custom">eigen toevoeging</span>' : '';
      html += renderItem(id, item.w, meta, item.t, isCustom);
    });
    html += '</div></div>';
  });

  html += '<div class="niet-meenemen"><h3>Niet meenemen (aanwezig in ziekenhuis)</h3><p style="font-size:0.75rem;color:#7A6E65;margin-bottom:0.5rem">Best even op voorhand checken bij je ziekenhuis</p><ul>';
  DATA.ziekenhuis.niet.forEach(item => { html += '<li>' + esc(item) + '</li>'; });
  html += '</ul></div>';

  container.innerHTML = html;
}

// Search
document.querySelectorAll('.search-input').forEach(input => {
  input.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    const page = this.dataset.page;
    document.getElementById('content-' + page).querySelectorAll('.item').forEach(item => {
      const text = item.textContent.toLowerCase();
      item.style.display = (text.includes(query) && !hidden[item.dataset.id]) ? '' : 'none';
    });
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('page-' + this.dataset.page).classList.add('active');
  });
});

// Reset functions
function resetAll() {
  if (confirm('Weet je zeker dat je alle vinkjes wilt resetten?')) {
    checked = {};
    saveChecked();
    rerender();
  }
}

function resetEverything() {
  if (confirm('Dit reset ALLES: vinkjes, verborgen items en eigen toevoegingen. Doorgaan?')) {
    checked = {};
    hidden = {};
    custom = { gb: [], kl: [], td: [], zh: [] };
    merken = {};
    saveChecked();
    saveHidden();
    saveCustom();
    saveMerken();
    rerender();
  }
}

function rerender() {
  renderGeboortelijst();
  renderKledij();
  renderTodos();
  renderZiekenhuis();
  updateProgress();
}

// Init
rerender();
</script>
</body>
</html>
